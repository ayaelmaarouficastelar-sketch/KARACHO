<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARACHO | Pistachos con carácter</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #2e4d2e;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 30px;
    letter-spacing: 2px;
}

/* HERO PORTADA */
.hero {
    background-image: url('https://images.unsplash.com/photo-1587731556938-38755b4803a6');
    background-size: cover;
    background-position: center;
    color: white;
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-size: 45px;
}

.hero p {
    font-size: 20px;
}

/* PRODUCTOS */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 40px;
}

.product {
    background: white;
    border-radius: 12px;
    width: 220px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

/* BOTÓN */
button {
    background: #2e4d2e;
    color: white;
    padding: 10px;
    border: none;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* FOOTER */
footer {
    background: #2e4d2e;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>KARACHO</header>

<!-- PORTADA -->
<section class="hero">
<h1>Pistachos con carácter</h1>
<p>Producto natural, directo y diferente</p>
</section>

<!-- PRODUCTOS -->
<section class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1615485737451-8b46c6c4d3b2">
<h3>Pistacho 100g</h3>
<p>3,50 €</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1604908177522-cba9b63b16d1">
<h3>Pistacho 200g</h3>
<p>6,00 €</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1587731556938-38755b4803a6">
<h3>Pistacho pelado</h3>
<p>5,50 €</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1622205313162-be1d571c1c9f">
<h3>Pack 3x100g</h3>
<p>9,99 €</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1617196038435-9a2b3b3b5a2c">
<h3>Tarro 300g</h3>
<p>8,50 €</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1590080875791-98c78c54a1b5">
<h3>Formato 1kg</h3>
<p>18,00 €</p>
<button>Comprar</button>
</div>

</section>

<footer>
<p>KARACHO © 2026</p>
<p>Contacto: karacho@email.com</p>
</footer>

</html>
